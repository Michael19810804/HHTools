services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-}
    ports:
      - "127.0.0.1:8080:80"
    # volumes:
    #   - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY}
      - PORT=3000
    restart: always
